apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: prod
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 348071628290.dkr.ecr.ap-south-1.amazonaws.com/frontend:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 80
